# profiles.yml — untuk dbt Projects on Snowflake (Workspace) & dev lokal.
#
# CATATAN PENTING:
# - Di Snowflake Workspace / DBT PROJECT object, KONEKSI DIURUS OLEH SNOWFLAKE
#   (pakai role/warehouse sesi Anda). Nilai account/user/authenticator di bawah
#   DIABAIKAN oleh platform — diberi default agar file selalu ter-render.
# - Untuk dbt-core LOKAL (opsional), set env var:
#     export DBT_ACCOUNT=... DBT_USER=... DBT_PRIVATE_KEY_PATH=~/snowflake_key.p8
amar_workshop:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('DBT_ACCOUNT', 'managed_by_snowflake') }}"
      user: "{{ env_var('DBT_USER', 'managed_by_snowflake') }}"
      authenticator: snowflake_jwt
      private_key_path: "{{ env_var('DBT_PRIVATE_KEY_PATH', '') }}"
      role: "{{ env_var('DBT_ROLE', 'AMAR_DATA_ENGINEER') }}"
      database: AMAR_WORKSHOP
      warehouse: AMAR_WORKSHOP_WH
      schema: SILVER
      threads: 4
