# profiles.yml — untuk dbt Projects on Snowflake (Workspace) & dev lokal.
#
# CATATAN PENTING (mengikuti pola Snowflake-Labs tasty_bytes demo):
# - Di Snowflake Workspace / DBT PROJECT object & saat `snow dbt`, KONEKSI
#   DIURUS OLEH SNOWFLAKE (pakai connection yang dipilih). account/user
#   TIDAK diperlukan -> diisi 'not needed' agar file selalu ter-render.
# - role/warehouse/database/schema HARUS yang valid & accessible, karena
#   nilai ini divalidasi saat deploy/build.
# - Sesi Data Engineering memakai role ACCOUNTADMIN. (Role kustom seperti
#   AMAR_DATA_ENGINEER hanya untuk lab Governance / Session 3.)
amar_workshop:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: 'not needed'
      user: 'not needed'
      role: ACCOUNTADMIN
      database: AMAR_WORKSHOP
      warehouse: AMAR_WORKSHOP_WH
      schema: SILVER
      threads: 4
    prod:
      type: snowflake
      account: 'not needed'
      user: 'not needed'
      role: ACCOUNTADMIN
      database: AMAR_WORKSHOP
      warehouse: AMAR_WORKSHOP_WH
      schema: SILVER
      threads: 4
